<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tone edit & effect edit demo</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif; margin: 0 auto; max-width: 1080px; padding: 12px; line-height: 1.4; }
    h1 { margin: 0 0 4px; }
    h2 { margin: 4px 0; }
    h3 { margin: 4px 0; font-size: 14px; }
    p { margin: 2px 0 8px; }
    .grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 8px; background: rgba(255,255,255,0.04); }
    label { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin: 3px 0; }
    label span { font-size: 13px; }
    input[type="number"] { width: 80px; }
    textarea { width: 100%; min-height: 60px; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; padding: 6px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; }
    select, button { padding: 4px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px; }
    button { cursor: pointer; }
    .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }
    .status { margin-top: 8px; padding: 6px 10px; border-radius: 6px; border: 1px solid transparent; font-size: 13px; }
    .status[data-state="info"] { border-color: #999; }
    .status[data-state="error"] { border-color: #d9534f; color: #d9534f; }
    .status[data-state="success"] { border-color: #28a745; color: #28a745; }
    .note { font-size: 12px; color: #666; margin-top: 2px; }
    .param-row { border-bottom: 1px dashed #ccc; padding-bottom: 3px; margin-bottom: 3px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "tonejs-json-sequencer": "../dist/libs/tonejs-json-sequencer.mjs",
      "tonejs-mml-to-json": "../dist/index.js",
      "web-tree-sitter": "../dist/web-tree-sitter.js"
    }
  }
  </script>
</head>
<body>
  <h1>tone edit & effect edit demo</h1>
  <p>音色とエフェクトを数値で編集しながらMMLを自動生成する実験デモです。</p>

  <section class="grid">
    <div class="card">
      <h2>Instrument</h2>
      <div class="row">
        <select id="instrumentSelect"></select>
        <button id="randomInstrument">ランダム音色</button>
      </div>
      <div id="instrumentParams"></div>
      <textarea id="instrumentMml" spellcheck="false"></textarea>
    </div>

    <div class="card">
      <h2>Effect</h2>
      <div class="row">
        <select id="effectSelect"></select>
        <button id="randomEffect">ランダム効果</button>
      </div>
      <div id="effectParams"></div>
      <textarea id="effectMml" spellcheck="false" placeholder="@Effect{ ... }"></textarea>
      <div class="note">No Effectを選ぶとエフェクトMMLは空になります。</div>
    </div>

    <div class="card">
      <h2>Notes</h2>
      <div class="row">
        <select id="notePattern"></select>
      </div>
      <textarea id="noteMml" spellcheck="false"></textarea>
      <div class="note">プルダウンで差し替え、直接編集も可能です。</div>
    </div>

    <div class="card">
      <h2>Play & Export</h2>
      <div class="row">
        <button id="playNow">再生</button>
        <button id="exportState">エクスポート</button>
        <button id="importState">インポート</button>
      </div>
      <textarea id="stateJson" spellcheck="false" placeholder='設定の保存/貼り付け用JSON'></textarea>
      <div class="note">パラメータ編集・ランダム生成・MML編集で自動再生されます。</div>
    </div>
  </section>

  <section class="card" style="margin-top:8px;">
    <h2>Generated MML</h2>
    <textarea id="combinedMml" spellcheck="false"></textarea>
    <h3>JSON (tonejs-json-sequencer)</h3>
    <textarea id="jsonPreview" spellcheck="false" rows="8"></textarea>
    <div id="status" class="status" data-state="info">初期化中...</div>
  </section>

  <script src="https://unpkg.com/tone@15.0.4/build/Tone.js"></script>
  <script type="module">
    import '../dist/tone-edit-demo.js';
  </script>
</body>
</html>
